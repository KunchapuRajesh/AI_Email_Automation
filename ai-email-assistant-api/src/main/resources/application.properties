# Server
server.port=8080

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
# OAuth Scopes
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/gmail.modify,https://www.googleapis.com/auth/gmail.send

# Optional
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend (React app) URL
app.frontend.url=http://localhost:5173

# Logging
logging.level.org.springframework.security=DEBUG


# Grok AI (xAI)
grok.api.key=YOUR_GROQ_API_KEY
grok.api.url=https://api.groq.com/openai/v1/chat/completions
grok.model=llama-3.1-8b-instant